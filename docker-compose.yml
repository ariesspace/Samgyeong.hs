services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "${SAMGYEONG_HTTP_BIND:-0.0.0.0}:${SAMGYEONG_HTTP_PORT:-8080}:80"
    volumes:
      - ./app/public:/var/www/html/public:ro
      - ./app/storage/uploads:/var/www/html/storage/uploads:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    command: sh -c "mkdir -p storage/data storage/uploads && chown -R www-data:www-data storage && php-fpm"
    volumes:
      - ./app:/var/www/html
      - samgyeong_data:/var/www/html/storage/data
    restart: unless-stopped

volumes:
  samgyeong_data:
